# workflow for downloading and pushing artifacts when there is a release.

name: download-artifacts

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Download artifacts
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || startsWith(github.ref, 'refs/tags/')
    concurrency:
      group: download-artifacts-${{ github.ref }}
      cancel-in-progress: true

    env:
      # How long to wait (max) for the matching Build run to appear/finish on tag pushes.
      # 100 attempts * 15s = 1500s ≈ 25 minutes.
      BUILD_RUN_ATTEMPTS: "100"
      BUILD_RUN_SLEEP_SECS: "15"

    steps:
      - name: Checkout (for config)
        uses: actions/checkout@v4

      - name: Detect project directory
        id: detect
        shell: bash
        run: |
          if [ -f "Selenix-Browser/package.json" ]; then
            PROJECT_DIR="Selenix-Browser"
          else
            PROJECT_DIR="."
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Using PROJECT_DIR=$PROJECT_DIR"
          mkdir -p "$PROJECT_DIR/dist"

      - name: Read product name
        id: meta
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          PRODUCT_NAME=$(node -e "try{console.log(require('./electron-builder.json').productName)}catch(e){try{console.log(require('./package.json').productName)}catch(e2){console.log('app')}}")
          echo "PRODUCT_NAME=$PRODUCT_NAME" >> "$GITHUB_ENV"
          echo "Product: $PRODUCT_NAME"

      - name: Ensure GitHub CLI (gh)
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo bash -c 'until ! pgrep -x apt >/dev/null && \
                                ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && \
                                ! fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
                            echo "Waiting for apt/dpkg locks..."; sleep 5; done'
            sudo apt-get update -y || true
            sudo apt-get install -y gh
          fi
          gh --version

      - name: Establish TAG/SHA/RUN_ID from context
        id: establish
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "RUN_ID=${{ github.event.workflow_run.id }}" >> "$GITHUB_ENV"
            echo "TAG=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_ENV"
            echo "SHA=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
            echo "Using workflow_run context -> run_id=$RUN_ID tag=$TAG sha=$SHA"
          else
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
            echo "Using push context -> tag=${GITHUB_REF_NAME} sha=${GITHUB_SHA}"
          fi

      - name: Resolve/await matching Build run (robust)
        if: env.RUN_ID == ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${TAG:?TAG not set}"
          SHA="${SHA:?SHA not set}"
          ATTEMPTS="${BUILD_RUN_ATTEMPTS:-100}"
          SLEEP_SECS="${BUILD_RUN_SLEEP_SECS:-15}"

          echo "Looking for successful 'Build' run for tag=$TAG or sha=$SHA"
          RUN_ID=""

          find_run() {
            gh run list \
              --workflow "Build" \
              --json databaseId,headSha,headBranch,status,conclusion,createdAt \
              --limit 200 | \
            node -e '
              let s=""; process.stdin.on("data",d=>s+=d);
              process.stdin.on("end",()=>{
                const arr=JSON.parse(s);
                const sha=process.env.SHA;
                const tag=process.env.TAG;
                // Prefer exact SHA; else match by tag name
                const bySha = arr.find(r => r.headSha === sha);
                const byTag = arr.find(r => r.headBranch === tag);
                const run = bySha || byTag;
                if (run) process.stdout.write(String(run.databaseId));
              });
            '
          }

          for i in $(seq 1 "$ATTEMPTS"); do
            RUN_ID="$(find_run || true)"
            if [ -n "$RUN_ID" ]; then
              echo "Found Build run id: $RUN_ID (attempt $i/$ATTEMPTS)"
              break
            fi
            echo "Build run not found yet; sleeping ${SLEEP_SECS}s..."
            sleep "$SLEEP_SECS"
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::No 'Build' run found for tag/sha after waiting."
            exit 1
          fi

          echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"

          # Now ensure it finishes successfully. If still running, this will wait.
          echo "Waiting for Build run $RUN_ID to complete..."
          if ! gh run watch "$RUN_ID" --exit-status; then
            echo "::error::Build run $RUN_ID did not succeed."
            exit 1
          fi
          echo "Build run $RUN_ID completed successfully."

      - name: Download all artifacts from Build run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${RUN_ID:?RUN_ID not set}"
          gh run download "$RUN_ID" --dir "$PROJECT_DIR/dist"
          echo "Downloaded files:"
          find "$PROJECT_DIR/dist" -type f -maxdepth 3 -print

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          : "${TAG:?TAG not set}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::No GitHub Release found for tag '$TAG'. Create it first, then re-run."
            exit 1
          fi

      - name: Upload artifacts (deterministic order; skip missing; clobber latest*.yml)
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${TAG:?TAG not set}"
          VERSION="${TAG#v}"
          PN="${PRODUCT_NAME}"

          # Helper: first existing file that matches any of the given patterns
          first_match() {
            for pat in "$@"; do
              f=$(find dist -type f -name "$pat" -print -quit)
              if [ -n "$f" ]; then
                echo "$f"
                return 0
              fi
            done
            return 1
          }

          # Compute canonical candidates but pick from what actually exists LOCALLY.
          yml_linux=$(first_match "latest-linux.yml" || true)
          yml_mac=$(first_match "latest-mac.yml" || true)
          yml_win=$(first_match "latest.yml" || true)

          # Windows (ia32 + x64)
          win_ia32_zip=$(first_match "${PN}-${VERSION}-ia32-win.zip" || true)
          win_ia32_7z=$(first_match "${PN}-${VERSION}-ia32.nsis.7z" || true)
          win_x64_zip=$(first_match "${PN}-${VERSION}-x64-win.zip" "${PN}-${VERSION}-win.zip" || true)
          win_x64_7z=$(first_match "${PN}-${VERSION}-x64.nsis.7z" || true)
          web_setup=$(first_match "${PN}-Web-Setup-${VERSION}.exe" || true)

          # Linux
          appimage=$(first_match "${PN}-${VERSION}-x86_64.AppImage" "${PN}-${VERSION}.AppImage" || true)
          deb=$(first_match "${PN}_${VERSION}_amd64.deb" "${PN}-${VERSION}-amd64.deb" || true)

          # macOS
          mac_zip_arm64=$(first_match "${PN}-${VERSION}-arm64-mac.zip" || true)
          dmg=$(first_match "${PN}-${VERSION}-arm64-mac.dmg" "${PN}-${VERSION}-arm64.dmg" || true)
          dmg_blockmap=$(first_match "${PN}-${VERSION}-arm64-mac.dmg.blockmap" "${PN}-${VERSION}-arm64.dmg.blockmap" || true)

          # Deterministic order (Wexond-style)
          order=(
            "$yml_linux"
            "$yml_mac"
            "$yml_win"
            "$win_ia32_zip"
            "$win_ia32_7z"
            "$mac_zip_arm64"
            "$win_x64_zip"
            "$win_x64_7z"
            "$appimage"
            "$dmg"
            "$dmg_blockmap"
            "$web_setup"
            "$deb"
          )

          echo "Uploading in deterministic order (skipping missing):"
          for f in "${order[@]}"; do
            [ -z "$f" ] && continue
            base=$(basename "$f")
            echo "  - $base"
            if [[ "$base" == latest*.yml ]]; then
              gh release upload "$TAG" "$f" --clobber || true
            else
              if ! gh release upload "$TAG" "$f"; then
                gh release upload "$TAG" "$f" --clobber || true
              fi
            fi
          done

          echo "Done."
