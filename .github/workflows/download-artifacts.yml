name: download-artifacts

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Download artifacts and publish release assets
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || startsWith(github.ref, 'refs/tags/')
    concurrency:
      group: download-artifacts-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout (for config)
        uses: actions/checkout@v4

      - name: Detect project directory
        id: detect
        shell: bash
        run: |
          if [ -f "Selenix-Browser/package.json" ]; then
            PROJECT_DIR="Selenix-Browser"
          else
            PROJECT_DIR="."
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Using PROJECT_DIR=$PROJECT_DIR"
          mkdir -p "$PROJECT_DIR/dist"

      - name: Read product name
        id: meta
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          PRODUCT_NAME=$(node -e "try{console.log(require('./electron-builder.json').productName)}catch(e){try{console.log(require('./package.json').productName)}catch(e2){console.log('app')}}")
          echo "PRODUCT_NAME=$PRODUCT_NAME" >> "$GITHUB_ENV"
          echo "Product: $PRODUCT_NAME"

      - name: Ensure GitHub CLI (gh)
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo bash -c 'until ! pgrep -x apt >/dev/null && \
                                ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && \
                                ! fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
                            echo "Waiting for apt/dpkg locks..."; sleep 5; done'
            sudo apt-get update -y || true
            sudo apt-get install -y gh
          fi
          gh --version

      - name: Determine tag, run and sha from context
        id: ctx
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "RUN_ID=${{ github.event.workflow_run.id }}" >> "$GITHUB_ENV"
            echo "TAG=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_ENV"
            echo "SHA=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi
          echo "Context: TAG=$TAG SHA=$SHA RUN_ID=${RUN_ID:-unset}"

      # Wait dynamically (no fixed timeout) for ALL 3 matrix artifacts to exist
      - name: Wait for all Build artifacts (Linux, macOS, Windows)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Resolve RUN_ID if not present (tag path)
          if [ -z "${RUN_ID:-}" ]; then
            RUN_ID="$(
              gh run list \
                --workflow "Build" \
                --json databaseId,headSha,headBranch,conclusion,createdAt \
                --limit 100 | \
              node -e '
                let s=""; process.stdin.on("data",d=>s+=d);
                process.stdin.on("end",()=>{
                  const arr=JSON.parse(s);
                  const sha=process.env.SHA;
                  const tag=process.env.TAG;
                  const run=arr.find(r=>r.conclusion==="success" && (r.headSha===sha || r.headBranch===tag));
                  if(run){ process.stdout.write(String(run.databaseId)); }
                });
              ' || true
            )"
            if [ -z "$RUN_ID" ]; then
              echo "::error::No successful Build run found for TAG=$TAG SHA=$SHA yet."
              exit 1
            fi
            echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          fi

          echo "Waiting for artifacts on run $RUN_ID ..."
          PN="${PRODUCT_NAME}"

          # exact artifact names from Build matrix
          WANT_L="${PN}-Linux-artifacts"
          WANT_M="${PN}-macOS-artifacts"
          WANT_W="${PN}-Windows-artifacts"

          # poll until all three are present (no hard timeout)
          i=0
          while :; do
            # list non-expired artifact names (one per line)
            NAMES="$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts --jq '.artifacts[] | select(.expired==false) | .name' -q '.[]?' || true)"
            echo "Visible artifacts:"
            printf '%s\n' "${NAMES:-<none>}"

            HAVE_L=
            HAVE_M=
            HAVE_W=
            grep -Fqx "$WANT_L" <<< "${NAMES:-}" && HAVE_L=1 || true
            grep -Fqx "$WANT_M" <<< "${NAMES:-}" && HAVE_M=1 || true
            grep -Fqx "$WANT_W" <<< "${NAMES:-}" && HAVE_W=1 || true

            if [ -n "${HAVE_L:-}" ] && [ -n "${HAVE_M:-}" ] && [ -n "${HAVE_W:-}" ]; then
              echo "All three artifacts are available."
              break
            fi

            i=$((i+1))
            if [ $((i % 12)) -eq 0 ]; then
              echo "Still waiting... ($(date -u +%H:%M:%S) UTC)"
            fi
            sleep 10
          done

      - name: Download all artifacts from Build run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ env.RUN_ID }}
          path: ${{ env.PROJECT_DIR }}/dist
          merge-multiple: true

      - name: List downloaded files
        shell: bash
        run: |
          echo "Downloaded files under $PROJECT_DIR/dist:"
          find "$PROJECT_DIR/dist" -type f -maxdepth 3 -print

      # ---- release checks / uploads ----

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          : "${TAG:?TAG not set}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::No GitHub Release found for tag '$TAG'. Create it first, then re-run."
            exit 1
          fi

      - name: Build expected file list and detect existing release assets
        id: precheck
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PN="${PRODUCT_NAME}"
          TAG="${TAG:?}"
          VERSION="${TAG#v}"

          list_assets() { gh release view "$TAG" --json assets --jq '.assets[].name' || true; }
          ASSET_NAMES="$(list_assets || true)"

          pick_name() {
            if echo "$ASSET_NAMES" | grep -qx "$1"; then echo "$1"; else echo "$2"; fi
          }

          WIN_ZIP="$(pick_name "${PN}-${VERSION}-x64-win.zip" "${PN}-${VERSION}-win.zip")"
          APPIMG="$(pick_name "${PN}-${VERSION}-x86_64.AppImage" "${PN}-${VERSION}.AppImage")"
          DMG_NAME="$(pick_name "${PN}-${VERSION}-arm64-mac.dmg" "${PN}-${VERSION}-arm64.dmg")"
          DMG_BLOCKMAP_NAME="$(pick_name "${PN}-${VERSION}-arm64-mac.dmg.blockmap" "${PN}-${VERSION}-arm64.dmg.blockmap")"
          if echo "$ASSET_NAMES" | grep -qx "${PN}_${VERSION}_amd64.deb"; then
            DEB="${PN}_${VERSION}_amd64.deb"
          else
            DEB="${PN}-${VERSION}-amd64.deb"
          fi

          TMP_DIR="$(mktemp -d)"
          EXPECTED_FILE="$TMP_DIR/expected.txt"
          CURRENT_FILE="$TMP_DIR/current.txt"
          EXTRAS_FILE="$TMP_DIR/extras.txt"
          MISSING_FILE="$TMP_DIR/missing.txt"

          printf "%s\n" \
            "latest-linux.yml" \
            "latest-mac.yml" \
            "latest.yml" \
            "${PN}-${VERSION}-ia32-win.zip" \
            "${PN}-${VERSION}-ia32.nsis.7z" \
            "${PN}-${VERSION}-arm64-mac.zip" \
            "${WIN_ZIP}" \
            "${PN}-${VERSION}-x64.nsis.7z" \
            "${APPIMG}" \
            "${DMG_NAME}" \
            "${DMG_BLOCKMAP_NAME}" \
            "${PN}-Web-Setup-${VERSION}.exe" \
            "${DEB}" \
            > "$EXPECTED_FILE"

          echo "$ASSET_NAMES" | sort -u > "$CURRENT_FILE"
          sort -u "$EXPECTED_FILE" -o "$EXPECTED_FILE"

          comm -13 "$EXPECTED_FILE" "$CURRENT_FILE" > "$EXTRAS_FILE" || true
          comm -23 "$EXPECTED_FILE" "$CURRENT_FILE" > "$MISSING_FILE" || true

          echo "EXPECTED_FILE=$EXPECTED_FILE" >> "$GITHUB_ENV"
          echo "MISSING_FILE=$MISSING_FILE" >> "$GITHUB_ENV"
          echo "EXTRAS_FILE=$EXTRAS_FILE" >> "$GITHUB_ENV"

          EXTRAS_N=$(wc -l < "$EXTRAS_FILE" | tr -d ' ')
          MISSING_N=$(wc -l < "$MISSING_FILE" | tr -d ' ')
          echo "Extras: $EXTRAS_N, Missing: $MISSING_N"
          if [ "$EXTRAS_N" -eq 0 ] && [ "$MISSING_N" -eq 0 ]; then
            echo "RELEASE_COMPLETE=yes" >> "$GITHUB_ENV"
            echo "Release already complete with exactly 13 assets."
          fi

      - name: Delete unexpected extra assets from release
        if: env.RELEASE_COMPLETE != 'yes'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -s "$EXTRAS_FILE" ]; then
            echo "Pruning unexpected assets:"
            cat "$EXTRAS_FILE"
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              gh release delete-asset "$TAG" "$name" -y || true
            done < "$EXTRAS_FILE"
          else
            echo "No extras to prune."
          fi

      - name: Upload exactly Wexond-style 13 files (robust retries)
        if: env.RELEASE_COMPLETE != 'yes'
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${TAG:?TAG not set}"
          VERSION="${TAG#v}"
          PN="${PRODUCT_NAME}"

          choose_local() {
            for cand in "$@"; do
              f=$(find dist -type f -name "$cand" -print -quit)
              [ -n "$f" ] && { echo "$cand"; return 0; }
            done
            echo "$1"
          }
          WIN_ZIP="$(choose_local "${PN}-${VERSION}-x64-win.zip" "${PN}-${VERSION}-win.zip")"
          APPIMG="$(choose_local "${PN}-${VERSION}-x86_64.AppImage" "${PN}-${VERSION}.AppImage")"
          DMG_NAME="$(choose_local "${PN}-${VERSION}-arm64-mac.dmg" "${PN}-${VERSION}-arm64.dmg")"
          DMG_BLOCKMAP_NAME="$(choose_local "${PN}-${VERSION}-arm64-mac.dmg.blockmap" "${PN}-${VERSION}-arm64.dmg.blockmap")"
          if find dist -type f -name "${PN}_${VERSION}_amd64.deb" -print -quit >/dev/null; then
            DEB="${PN}_${VERSION}_amd64.deb"
          else
            DEB="${PN}-${VERSION}-amd64.deb"
          fi

          ORDERED=(
            "latest-linux.yml"
            "latest-mac.yml"
            "latest.yml"
            "${PN}-${VERSION}-ia32-win.zip"
            "${PN}-${VERSION}-ia32.nsis.7z"
            "${PN}-${VERSION}-arm64-mac.zip"
            "${WIN_ZIP}"
            "${PN}-${VERSION}-x64.nsis.7z"
            "${APPIMG}"
            "${DMG_NAME}"
            "${DMG_BLOCKMAP_NAME}"
            "${PN}-Web-Setup-${VERSION}.exe"
            "${DEB}"
          )

          MISSING_NAMES=$(cat "$MISSING_FILE" || true)

          FILES=()
          for name in "${ORDERED[@]}"; do
            [ -z "$name" ] && continue
            echo "$MISSING_NAMES" | grep -qx "$name" || continue
            f=$(find dist -type f -name "$name" -print -quit)
            [ -n "$f" ] && FILES+=( "$f" )
          done

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "Nothing to upload; release now matches the 13-file set."
            exit 0
          fi

          echo "Uploading (missing only) in deterministic order:"
          printf '  - %s\n' "${FILES[@]}"

          upload_with_retry() {
            local file="$1"
            local base="$(basename "$file")"
            local attempts=6
            local delay=5
            for i in $(seq 1 "$attempts"); do
              echo "[$i/$attempts] Uploading $base ..."
              if gh release upload "$TAG" "$file" --clobber >/dev/null 2>&1; then
                if gh release view "$TAG" --json assets --jq ".assets[].name" | grep -qx "$base"; then
                  echo "Uploaded and verified: $base"
                  return 0
                fi
                echo "Upload returned OK but $base not visible yet; waiting..."
              else
                echo "Upload failed for $base; will retry..."
              fi
              sleep "$delay"
              delay=$((delay * 2))
            done
            echo "::error::Failed to upload $base after multiple attempts."
            return 1
          }

          for f in "${FILES[@]}"; do
            upload_with_retry "$f"
          done

      - name: Final verification (must be exactly 13 expected assets)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${TAG:?}"
          EXPECTED_FILE="${EXPECTED_FILE:?}"
          ASSET_NAMES="$(gh release view "$TAG" --json assets --jq '.assets[].name' | sort -u)"
          echo "Release assets after upload:"
          echo "$ASSET_NAMES"
          TMP="$(mktemp)"
          echo "$ASSET_NAMES" > "$TMP"
          sort -u "$EXPECTED_FILE" -o "$EXPECTED_FILE"
          comm -23 "$EXPECTED_FILE" "$TMP" > missing_final.txt || true
          MISSING_FINAL_N=$(wc -l < missing_final.txt | tr -d ' ')
          if [ "$MISSING_FINAL_N" -gt 0 ]; then
            echo "::error::Still missing $MISSING_FINAL_N required file(s):"
            cat missing_final.txt
            exit 1
          fi
          echo "✅ Release has all 13 required assets for $TAG."
