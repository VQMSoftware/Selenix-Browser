name: download-artifacts

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Download artifacts and publish release assets
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || startsWith(github.ref, 'refs/tags/')
    concurrency:
      group: download-artifacts-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout (for config)
        uses: actions/checkout@v4

      - name: Detect project directory
        id: detect
        shell: bash
        run: |
          if [ -f "Selenix-Browser/package.json" ]; then
            PROJECT_DIR="Selenix-Browser"
          else
            PROJECT_DIR="."
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Using PROJECT_DIR=$PROJECT_DIR"
          mkdir -p "$PROJECT_DIR/dist"

      - name: Read product name
        id: meta
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          PRODUCT_NAME=$(node -e "try{console.log(require('./electron-builder.json').productName)}catch(e){try{console.log(require('./package.json').productName)}catch(e2){console.log('app')}}")
          echo "PRODUCT_NAME=$PRODUCT_NAME" >> "$GITHUB_ENV"
          echo "Product: $PRODUCT_NAME"

      - name: Ensure GitHub CLI (gh)
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo bash -c 'until ! pgrep -x apt >/dev/null && \
                                ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && \
                                ! fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
                            echo "Waiting for apt/dpkg locks..."; sleep 5; done'
            sudo apt-get update -y || true
            sudo apt-get install -y gh
          fi
          gh --version

      - name: Determine tag, run and sha from context
        id: ctx
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "RUN_ID=${{ github.event.workflow_run.id }}" >> "$GITHUB_ENV"
            echo "TAG=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_ENV"
            echo "SHA=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi
          echo "Context: TAG=$TAG SHA=$SHA RUN_ID=${RUN_ID:-unset}"

      # Fast, quiet, **correct** wait until all three artifacts are listed by API
      - name: Wait for all Build artifacts (Linux, macOS, Windows)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Resolve RUN_ID if not present (tag path)
          if [ -z "${RUN_ID:-}" ]; then
            RUN_ID="$(
              gh run list \
                --workflow "Build" \
                --json databaseId,headSha,headBranch,conclusion,createdAt \
                --limit 100 | \
              node -e '
                let s=""; process.stdin.on("data",d=>s+=d);
                process.stdin.on("end",()=>{
                  const arr=JSON.parse(s);
                  const sha=process.env.SHA;
                  const tag=process.env.TAG;
                  const run=arr.find(r=>r.conclusion==="success" && (r.headSha===sha || r.headBranch===tag));
                  if(run){ process.stdout.write(String(run.databaseId)); }
                });
              ' || true
            )"
            if [ -z "$RUN_ID" ]; then
              echo "::error::No successful Build run found for TAG=$TAG SHA=$SHA yet."
              exit 1
            fi
            echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          fi

          PN="${PRODUCT_NAME}"
          WANT_L="${PN}-Linux-artifacts"
          WANT_M="${PN}-macOS-artifacts"
          WANT_W="${PN}-Windows-artifacts"

          echo "Waiting for artifacts on run $RUN_ID ..."
          i=0
          while :; do
            # exactly the three names (one per line), no giant JSON dump
            NAMES="$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
              --jq '.artifacts[] | select(.expired==false) | .name' 2>/dev/null || true)"

            HAVE_L=
            HAVE_M=
            HAVE_W=
            grep -Fqx "$WANT_L" <<< "${NAMES:-}" && HAVE_L=1 || true
            grep -Fqx "$WANT_M" <<< "${NAMES:-}" && HAVE_M=1 || true
            grep -Fqx "$WANT_W" <<< "${NAMES:-}" && HAVE_W=1 || true

            echo "found: L=${HAVE_L:+yes}${HAVE_L:-no} M=${HAVE_M:+yes}${HAVE_M:-no} W=${HAVE_W:+yes}${HAVE_W:-no}"

            if [ -n "${HAVE_L:-}" ] && [ -n "${HAVE_M:-}" ] && [ -n "${HAVE_W:-}" ]; then
              break
            fi

            i=$((i+1))
            # brief heartbeat each ~20s, otherwise stay quiet
            if [ $((i % 4)) -eq 0 ]; then
              echo "still waiting... ($(date -u +%H:%M:%S) UTC)"
            fi
            sleep 5
          done

      - name: Download all artifacts from Build run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ env.RUN_ID }}
          path: ${{ env.PROJECT_DIR }}/dist
          merge-multiple: true

      - name: List downloaded files
        shell: bash
        run: |
          echo "Downloaded files under $PROJECT_DIR/dist:"
          find "$PROJECT_DIR/dist" -type f -maxdepth 3 -print

      # ---- release checks / uploads ----

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          : "${TAG:?TAG not set}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::No GitHub Release found for tag '$TAG'. Create it first, then re-run."
            exit 1
          fi

      # >>> FIX: build the expected list from the ACTUAL artifact file names (no PN/VERSION guess) <<<
      - name: Build expected file list from local artifacts & detect existing release assets
        id: precheck
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Helper to find the first match among patterns (case-insensitive)
          find_one() {
            for pat in "$@"; do
              f=$(find dist -type f -iname "$pat" -print -quit 2>/dev/null || true)
              if [ -n "$f" ]; then
                echo "$f"
                return 0
              fi
            done
            echo ""
            return 1
          }

          # Derive EXPECTED list from the real files produced by the 3 runners
          declare -a EXPECTED=()

          # these 3 are usually exact names; include if present (case-insensitive)
          for y in "latest-linux.yml" "latest-mac.yml" "latest.yml"; do
            f=$(find_one "$y")
            if [ -n "$f" ]; then EXPECTED+=("$(basename "$f")"); else EXPECTED+=("$y"); fi
          done

          # Windows artifacts
          F_IA32_ZIP=$(find_one "*-ia32-win.zip")
          F_IA32_NSIS=$(find_one "*-ia32.nsis.7z")
          F_X64_ZIP=$(find_one "*-x64-win.zip" "*-win.zip")
          F_X64_NSIS=$(find_one "*-x64.nsis.7z")
          F_WEB_SETUP=$(find_one "*-Web-Setup-*.exe")

          # Linux artifacts
          F_APPIMG=$(find_one "*-x86_64.AppImage" "*.AppImage")
          F_DEB=$(find_one "*_amd64.deb" "*-amd64.deb")

          # macOS artifacts (arm64)
          F_MAC_ZIP=$(find_one "*-arm64-mac.zip" "*-arm64.zip")
          F_DMG=$(find_one "*-arm64-mac.dmg" "*-arm64.dmg")
          F_DMG_BM=$(find_one "*-arm64-mac.dmg.blockmap" "*-arm64.dmg.blockmap")

          for f in "$F_IA32_ZIP" "$F_IA32_NSIS" "$F_MAC_ZIP" "$F_X64_ZIP" "$F_X64_NSIS" "$F_APPIMG" "$F_DMG" "$F_DMG_BM" "$F_WEB_SETUP" "$F_DEB"; do
            if [ -n "$f" ]; then
              EXPECTED+=("$(basename "$f")")
            fi
          done

          # Write EXPECTED list (unique, sorted). If some weren't found yet we still include the conventional name so verification reflects reality.
          TMP_DIR="$(mktemp -d)"
          EXPECTED_FILE="$TMP_DIR/expected.txt"
          printf "%s\n" "${EXPECTED[@]}" | sed '/^$/d' | sort -u > "$EXPECTED_FILE"
          echo "EXPECTED_FILE=$EXPECTED_FILE" >> "$GITHUB_ENV"

          # Get existing release assets
          ASSET_NAMES="$(gh release view "$TAG" --json assets --jq '.assets[].name' || true)"
          echo "$ASSET_NAMES" | sort -u > "$TMP_DIR/current.txt"

          # Compute extras/missing vs EXPECTED (by actual basenames)
          EXTRAS_FILE="$TMP_DIR/extras.txt"
          MISSING_FILE="$TMP_DIR/missing.txt"
          comm -13 "$EXPECTED_FILE" "$TMP_DIR/current.txt" > "$EXTRAS_FILE" || true
          comm -23 "$EXPECTED_FILE" "$TMP_DIR/current.txt" > "$MISSING_FILE" || true

          echo "EXTRAS_FILE=$EXTRAS_FILE" >> "$GITHUB_ENV"
          echo "MISSING_FILE=$MISSING_FILE" >> "$GITHUB_ENV"

          EXTRAS_N=$(wc -l < "$EXTRAS_FILE" | tr -d ' ')
          MISSING_N=$(wc -l < "$MISSING_FILE" | tr -d ' ')
          echo "Extras: $EXTRAS_N, Missing: $MISSING_N"
          if [ "$EXTRAS_N" -eq 0 ] && [ "$MISSING_N" -eq 0 ]; then
            echo "RELEASE_COMPLETE=yes" >> "$GITHUB_ENV"
            echo "Release already complete with all expected assets."
          fi

      - name: Delete unexpected extra assets from release
        if: env.RELEASE_COMPLETE != 'yes'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -s "$EXTRAS_FILE" ]; then
            echo "Pruning unexpected assets:"
            cat "$EXTRAS_FILE"
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              gh release delete-asset "$TAG" "$name" -y || true
            done < "$EXTRAS_FILE"
          else
            echo "No extras to prune."
          fi

      - name: Upload exactly Wexond-style 13 files (robust, uses actual basenames)
        if: env.RELEASE_COMPLETE != 'yes'
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${TAG:?TAG not set}"
          : "${EXPECTED_FILE:?EXPECTED_FILE not set}"
          : "${MISSING_FILE:?MISSING_FILE not set}"

          mapfile -t ORDERED < "$EXPECTED_FILE"
          MISSING_NAMES="$(cat "$MISSING_FILE" || true)"

          # Build list of local files to upload (only those still missing), by matching ACTUAL basenames found earlier
          FILES=()
          for base in "${ORDERED[@]}"; do
            [ -z "$base" ] && continue
            echo "$MISSING_NAMES" | grep -qx "$base" || continue
            f=$(find dist -type f -name "$base" -o -iname "$base" -print -quit)
            [ -n "$f" ] && FILES+=( "$f" )
          done

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "Nothing to upload from local artifacts yet (or already uploaded)."
          else
            echo "Uploading (missing only) in deterministic order:"
            printf '  - %s\n' "${FILES[@]}"

            upload_with_retry() {
              local file="$1"
              local base="$(basename "$file")"
              local attempts=6
              local delay=5
              for i in $(seq 1 "$attempts"); do
                echo "[$i/$attempts] Uploading $base ..."
                if gh release upload "$TAG" "$file" --clobber >/dev/null 2>&1; then
                  if gh release view "$TAG" --json assets --jq ".assets[].name" | grep -qx "$base"; then
                    echo "Uploaded and verified: $base"
                    return 0
                  fi
                  echo "Upload OK but $base not visible yet; waiting..."
                else
                  echo "Upload failed for $base; will retry..."
                fi
                sleep "$delay"
                delay=$((delay * 2))
              done
              echo "::error::Failed to upload $base after multiple attempts."
              return 1
            }

            for f in "${FILES[@]}"; do
              upload_with_retry "$f"
            done
          fi

      - name: Final verification (must match the basenames we derived from artifacts)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${TAG:?}"
          : "${EXPECTED_FILE:?}"

          ASSET_NAMES="$(gh release view "$TAG" --json assets --jq '.assets[].name' | sort -u)"
          echo "Release assets after upload:"
          echo "$ASSET_NAMES"

          TMP="$(mktemp)"
          echo "$ASSET_NAMES" > "$TMP"
          sort -u "$EXPECTED_FILE" -o "$EXPECTED_FILE"

          comm -23 "$EXPECTED_FILE" "$TMP" > missing_final.txt || true
          MISSING_FINAL_N=$(wc -l < missing_final.txt | tr -d ' ')
          if [ "$MISSING_FINAL_N" -gt 0 ]; then
            echo "::error::Still missing $MISSING_FINAL_N required file(s):"
            cat missing_final.txt
            exit 1
          fi
          echo "✅ Release has all expected assets for $TAG."
